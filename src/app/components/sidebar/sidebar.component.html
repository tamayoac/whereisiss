<div class="flex flex-wrap justify-center mx-10 my-10">
    <div class="w-full flex bg-darkerGray">  
        <div class="w-1/3 py-2 font-bold px-2 text-gray-500">Longitude</div>
        <div class="w-2/3 py-2 text-gray-500">{{longitude.toFixed(2)}}°</div>
    </div>
    <div class="w-full flex">
        <div class="w-1/3 py-2 font-bold px-2 text-gray-500">Latitude</div>
        <div class="w-2/3 py-2 text-gray-500">{{latitude.toFixed(2)}}°</div>
    </div>
    <div class="w-full flex  bg-darkerGray">  
        <div class="w-1/3 py-2 font-bold px-2 text-gray-500">Velocity</div>
        <div class="w-2/3 py-2 text-gray-500">{{velocity}}</div>
    </div>
    <div class="w-full flex">
        <div class="w-1/3 py-2 font-bold px-2 text-gray-500">Altitude</div>
        <div class="w-2/3 py-2 text-gray-500">{{altitude.toFixed(2)}} Km</div>
    </div>
    <div class="w-full flex bg-darkerGray">  
        <div class="w-1/3 py-2 font-bold px-2 text-gray-500">Time</div>
        <div class="w-2/3 py-2 text-gray-500">{{time}}</div>
    </div>
</div>
